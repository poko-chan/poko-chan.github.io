<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poko_chan accountにログイン</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('images/login-wallper.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
        }

        .glass-card {
            position: relative;
            width: 380px;
            height: 320px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 10;
            padding: 30px;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-icon { width: 24px; height: 24px; color: white; }
        .user-details p { margin: 0; }
        .user-name { font-weight: 700; font-size: 16px; }
        .user-role { font-size: 12px; opacity: 0.8; }
        .github-icon { width: 28px; height: 28px; fill: white; opacity: 0.9; }

        .card-body {
            text-align: center;
            margin: 20px 0;
        }

        .card-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card-description {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .glass-button {
            width: 100%;
            background: white;
            border: none;
            color: #333;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .glass-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .card-tip {
            font-size: 11px;
            text-align: center;
            opacity: 0.7;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="card-content">
            <div class="card-header">
                <div class="user-info">
                    <div class="avatar">
                        <svg class="avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="user-details">
                        <p class="user-name">Guest</p>
                        <p class="user-role">Welcome back</p>
                    </div>
                </div>
                <svg class="github-icon" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </div>

            <div class="card-body">
                <h3 class="card-title">Login</h3>
                <p class="card-description">GitHubアカウントを使用して、<br>安全にログインを開始します。</p>
                <button class="glass-button" onclick="startGitHubLogin()">GitHubでサインイン</button>
            </div>

            <p class="card-tip">※ 認証後、元のページにリダイレクトされます</p>
        </div>
    </div>

    <script>
        function startGitHubLogin() {
            const clientID = "Ov23liImrOPIOcZ5aDFJ";
            const redirectUri = "https://poko-chan.github.io/login"; 
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${clientID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=user`;
            window.location.href = authUrl;
        }
    </script>
</body>
</html>
